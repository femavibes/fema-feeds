services:
  postgres:
    image: postgres:16-alpine
    container_name: cfb-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cfb
      POSTGRES_PASSWORD: cfb_dev
      POSTGRES_DB: custom_feed_builder
    volumes:
      - cfb_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cfb -d custom_feed_builder']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cfb_pgdata:
