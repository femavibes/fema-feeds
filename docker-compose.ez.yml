# VPS / cloud server stack: postgres + API (DuckDNS IP sync) + Caddy (HTTPS on 443).
# Best when your server has a public IP (Linode, DigitalOcean, etc.).
#
# Quick start:
#   1. Set DUCKDNS_SUBDOMAIN and DUCKDNS_TOKEN in .env
#   2. .\scripts\docker-up.ps1 -Profile vps
#      (or: docker compose -f docker-compose.yml -f docker-compose.ez.yml up -d --build)
#   3. Open Settings → Feed publishing to confirm public URL
services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: cfb-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cfb:cfb_dev@postgres:5432/custom_feed_builder
      API_PORT: '3000'
      JETSTREAM_URL: ${JETSTREAM_URL:-wss://jetstream1.us-east.bsky.network/subscribe}
      BSKY_PUBLIC_API: ${BSKY_PUBLIC_API:-https://public.api.bsky.app}
      DUCKDNS_SUBDOMAIN: ${DUCKDNS_SUBDOMAIN:-}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
    volumes:
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: cfb-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      SITE_HOST: ${DUCKDNS_SUBDOMAIN}.duckdns.org
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - cfb_caddy_data:/data
      - cfb_caddy_config:/config
    depends_on:
      - api

volumes:
  cfb_caddy_data:
  cfb_caddy_config:
